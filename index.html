<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f8f4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ôn Nhanh">
  <meta name="description" content="Tìm đáp án CNTT theo từ khóa, học Flashcard và lưu câu chưa nhớ.">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Ôn Nhanh CNTT</title>
  <style>
    :root{--paper:#f7f8f4;--surface:#fff;--ink:#17201b;--muted:#66716a;--line:#dde3dd;--indigo:#3946a0;--indigo-soft:#eef0ff;--green:#176b4d;--green-soft:#e7f4ec;--green-line:#bddfca;--danger:#a23f4b;--danger-soft:#fff0f1}
    *{box-sizing:border-box}html{background:#e9ece7}body{margin:0;background:#e9ece7;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}button{color:inherit;cursor:pointer}button:focus-visible,input:focus-visible{outline:3px solid #3946a052;outline-offset:2px}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .shell{width:min(100%,520px);min-height:100svh;margin:0 auto;background:var(--paper);position:relative;padding-bottom:calc(92px + env(safe-area-inset-bottom));box-shadow:0 0 40px #17201b14}.topbar{display:flex;align-items:center;gap:10px;padding:22px 20px 10px}.brand{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;color:#fff;background:var(--indigo);font-weight:850;font-size:12px;box-shadow:0 6px 16px #3946a038}.brand-copy{display:flex;flex-direction:column;min-width:0}.brand-copy strong{font-size:18px;line-height:1.15}.brand-copy span{font-size:11px;color:var(--muted);margin-top:3px}.local{margin-left:auto;white-space:nowrap;border:1px solid var(--line);border-radius:999px;background:#ffffffb8;color:var(--muted);padding:7px 10px;font-size:10px;font-weight:750}.main{padding:22px 20px 36px}.eyebrow{margin:0 0 8px;color:var(--indigo);font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}h1{margin:0 0 20px;font-size:clamp(28px,8vw,36px);line-height:1.08;letter-spacing:-.045em}h2{margin:0;font-size:22px;line-height:1.3;letter-spacing:-.02em}h3{margin:0;font-size:14px}
    .search{min-height:58px;display:grid;grid-template-columns:28px 1fr 36px;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--indigo);border-radius:17px;padding:7px 10px 7px 14px;box-shadow:0 7px 20px #3946a014}.search:focus-within{box-shadow:0 0 0 4px #3946a01f,0 8px 24px #3946a01a}.search-icon{color:var(--indigo);font-size:28px;transform:rotate(-20deg);line-height:1}.search input{width:100%;min-width:0;border:0;outline:0;background:transparent;color:var(--ink);font-size:17px;font-weight:750}.search input::placeholder{color:#8a938d;font-weight:500}.clear{width:36px;height:36px;border:0;border-radius:50%;background:transparent;color:var(--muted);font-size:22px}.clear:hover{background:var(--indigo-soft);color:var(--indigo)}
    .meta{min-height:61px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);color:var(--muted);font-size:12px}.chip{display:inline-flex;align-items:center;min-height:30px;padding:5px 11px;border-radius:999px;background:var(--indigo-soft);color:var(--indigo);font-size:11px;font-weight:850;white-space:nowrap}.answer{padding-top:18px}.match{display:flex;align-items:center;gap:7px;margin-bottom:8px;color:var(--green);font-size:12px;font-weight:850}.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}.correct{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:88px;margin-top:15px;padding:17px 18px;border:1px solid var(--green-line);border-radius:17px;background:var(--green-soft)}.correct>div,.revealed{display:flex;flex-direction:column;gap:5px}.correct small,.revealed small{color:var(--green);font-size:10px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}.correct strong,.revealed strong{color:var(--green);font-size:24px;line-height:1.15}.check{flex:0 0 auto;width:34px;height:34px;display:grid;place-items:center;border-radius:50%;background:var(--green);color:#fff;font-size:20px;font-weight:900}.alt-label{margin:22px 0 8px;color:var(--muted);font-size:12px}.alts{list-style:none;margin:0;padding:0}.alts li{min-height:48px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);color:#48524c;font-size:13px}.alts li span{width:24px;height:24px;display:grid;place-items:center;border:1px solid var(--line);border-radius:7px;background:var(--surface);color:var(--muted);font-size:10px;font-weight:850}.mark{width:100%;min-height:46px;margin-top:18px;border:1px solid var(--line);border-radius:13px;background:var(--surface);color:var(--muted);font-size:12px;font-weight:750}.mark.on{border-color:#f0b9bf;background:var(--danger-soft);color:var(--danger)}
    .more{margin-top:24px}.more h3{margin-bottom:8px}.more button{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:13px 0;border:0;border-bottom:1px solid var(--line);background:transparent;text-align:left;font-size:13px}.more button span{color:var(--indigo);font-size:10px;font-weight:850}.empty{margin-top:28px;padding:26px 20px;border:1px dashed #cdd4cd;border-radius:17px;text-align:center;background:#ffffff80}.empty strong{display:block;font-size:18px}.empty p{margin:8px auto 18px;max-width:300px;color:var(--muted);font-size:13px;line-height:1.5}.empty button,.reveal,.recall button{min-height:46px;border:0;border-radius:13px;padding:0 18px;background:var(--indigo);color:#fff;font-weight:750}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}.section-head h1{margin-bottom:0}.section-head>span{color:var(--muted);font-size:12px}.flashcard{min-height:330px;display:flex;flex-direction:column;align-items:flex-start;margin-top:24px;padding:22px;border:1px solid var(--line);border-radius:22px;background:var(--surface);box-shadow:0 12px 34px #17201b12}.flashcard h2{margin:28px 0;font-size:25px}.reveal{width:100%;margin-top:auto}.revealed{width:100%;margin-top:auto;padding:20px;border-radius:15px;background:var(--green-soft)}.recall{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.recall button{background:var(--danger-soft);color:var(--danger);border:1px solid #f0b9bf}.recall .remembered{background:var(--green);border-color:var(--green);color:#fff}.wrong-list{display:grid;gap:10px}.wrong-item{position:relative;border:1px solid var(--line);border-radius:15px;background:var(--surface);overflow:hidden}.wrong-item>.open{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:5px;padding:15px 50px 15px 15px;border:0;background:transparent;text-align:left}.wrong-item span{color:var(--indigo);font-size:10px;font-weight:850}.wrong-item strong{font-size:14px}.wrong-item small{color:var(--green);font-size:12px}.remove{position:absolute;top:50%;right:10px;width:34px;height:34px;transform:translateY(-50%);border:0;border-radius:50%;background:var(--danger-soft);color:var(--danger);font-size:20px}
    .nav{position:fixed;z-index:10;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,520px);display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:9px 10px calc(9px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#f7f8f4f0;backdrop-filter:blur(16px)}.nav button{position:relative;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:0;border-radius:13px;background:transparent;color:var(--muted);font-size:10px;font-weight:750}.nav button>span{font-size:19px;line-height:1}.nav button.active{background:var(--indigo-soft);color:var(--indigo)}.nav b{position:absolute;top:7px;left:calc(50% + 10px);min-width:18px;height:18px;display:grid;place-items:center;border-radius:999px;background:var(--danger);color:#fff;font-size:9px}.notice{margin:0 0 16px;padding:10px 12px;border-radius:12px;background:#fff8d9;color:#6d5a10;font-size:11px;line-height:1.45}
    @media(min-width:700px){.shell{min-height:calc(100svh - 40px);margin-top:20px;border-radius:24px 24px 0 0;overflow:hidden}.main,.topbar{padding-inline:28px}}@media(prefers-reduced-motion:no-preference){button{transition:transform .12s ease,background-color .12s ease,color .12s ease,border-color .12s ease}button:active{transform:scale(.985)}}
  </style>
</head>
<body>
  <div id="app" class="shell"></div>
  <script src="questions.js"></script>
  <script>
    /* Câu mẫu cũ, giữ làm tham chiếu khi cần phát triển giao diện.
    const QUESTIONS=[
      {id:"m1-mainboard",module:1,q:"Mainboard là gì?",o:["Bo mạch chủ","Bộ nhớ chính của máy tính","Bộ xử lý trung tâm","Bộ nhớ lưu trữ bên ngoài"],a:"Bo mạch chủ",k:["mainboard","motherboard","bo mach chu"]},
      {id:"m1-cpu",module:1,q:"CPU là thành phần nào của máy tính?",o:["Bộ xử lý trung tâm","Bộ nhớ ngoài","Thiết bị nhập","Nguồn điện"],a:"Bộ xử lý trung tâm",k:["cpu","central processing unit","bo xu ly"]},
      {id:"m1-ram",module:1,q:"Đặc điểm đúng của bộ nhớ RAM là gì?",o:["Mất dữ liệu khi tắt nguồn","Lưu dữ liệu vĩnh viễn","Chỉ dùng để xuất hình ảnh","Không thể ghi dữ liệu"],a:"Mất dữ liệu khi tắt nguồn",k:["ram","tat nguon","bo nho tam"]},
      {id:"m1-os",module:1,q:"Hệ điều hành có chức năng chính nào?",o:["Quản lý phần cứng và phần mềm","Chỉ soạn thảo văn bản","Chỉ truy cập Internet","Thay thế hoàn toàn CPU"],a:"Quản lý phần cứng và phần mềm",k:["he dieu hanh","operating system","quan ly phan cung"]},
      {id:"m2-copy",module:2,q:"Phím tắt sao chép nội dung trong Windows là gì?",o:["Ctrl + C","Ctrl + V","Ctrl + X","Ctrl + Z"],a:"Ctrl + C",k:["sao chep","copy","phim tat"]},
      {id:"m2-delete",module:2,q:"Phím nào xóa tệp mà không đưa vào Thùng rác?",o:["Shift + Delete","Ctrl + Delete","Alt + Delete","Tab + Delete"],a:"Shift + Delete",k:["xoa tep","thung rac","shift delete"]},
      {id:"m3-save",module:3,q:"Phím tắt lưu tài liệu hiện tại là gì?",o:["Ctrl + S","Ctrl + P","Ctrl + N","Ctrl + F"],a:"Ctrl + S",k:["luu tai lieu","save","ctrl s"]},
      {id:"m3-find",module:3,q:"Phím tắt tìm kiếm văn bản trong tài liệu là gì?",o:["Ctrl + F","Ctrl + H","Ctrl + B","Ctrl + K"],a:"Ctrl + F",k:["tim kiem van ban","find","ctrl f"]},
      {id:"m4-formula",module:4,q:"Công thức trong bảng tính thường bắt đầu bằng ký tự nào?",o:["=","+","#","@"],a:"=",k:["cong thuc","bang tinh","excel","ky tu"]},
      {id:"m4-sum",module:4,q:"Hàm nào dùng để tính tổng trong bảng tính?",o:["SUM","COUNT","MAX","IF"],a:"SUM",k:["tinh tong","ham sum","excel"]},
      {id:"m5-slide",module:5,q:"Phím nào bắt đầu trình chiếu từ trang đầu?",o:["F5","F2","F7","F12"],a:"F5",k:["trinh chieu","slide","powerpoint","f5"]},
      {id:"m5-layout",module:5,q:"Layout trong phần mềm trình chiếu dùng để làm gì?",o:["Sắp xếp bố cục nội dung trang chiếu","Xóa toàn bộ bài trình chiếu","Kiểm tra virus","Kết nối máy in"],a:"Sắp xếp bố cục nội dung trang chiếu",k:["layout","bo cuc","trang chieu"]},
      {id:"m6-url",module:6,q:"URL dùng để biểu thị điều gì trên Internet?",o:["Địa chỉ của tài nguyên","Dung lượng bộ nhớ","Tốc độ CPU","Mật khẩu người dùng"],a:"Địa chỉ của tài nguyên",k:["url","dia chi","internet","tai nguyen"]},
      {id:"m6-https",module:6,q:"HTTPS khác HTTP chủ yếu ở điểm nào?",o:["Kết nối được mã hóa","Không cần Internet","Chỉ dùng cho thư điện tử","Luôn tải trang nhanh hơn"],a:"Kết nối được mã hóa",k:["https","http","ma hoa","bao mat"]},
      {id:"m6-phishing",module:6,q:"Dấu hiệu phổ biến của thư lừa đảo là gì?",o:["Thúc giục cung cấp mật khẩu hoặc mã xác nhận","Có chữ ký của người gửi","Được gửi trong giờ hành chính","Có tiêu đề ngắn"],a:"Thúc giục cung cấp mật khẩu hoặc mã xác nhận",k:["lua dao","phishing","mat khau","ma xac nhan"]}
    ]; */
    const QUESTIONS=window.QUESTIONS;
    const state={tab:"search",query:"mainboard",card:0,show:false,wrong:[]};
    try{state.wrong=JSON.parse(localStorage.getItem("on-nhanh-wrong")||"[]")}catch{state.wrong=[]}
    const app=document.getElementById("app");
    const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const norm=s=>String(s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D").toLowerCase().replace(/[^a-z0-9=+#@\s]/g," ").replace(/\s+/g," ").trim();
    function dist(a,b){const row=Array.from({length:b.length+1},(_,i)=>i);for(let i=1;i<=a.length;i++){let prev=row[0];row[0]=i;for(let j=1;j<=b.length;j++){const saved=row[j];row[j]=Math.min(row[j]+1,row[j-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=saved}}return row[b.length]}
    function score(item,query){const n=norm(query);if(!n)return 0;const hay=norm([item.q,item.a,...item.k].join(" "));let s=hay.includes(n)?120:0;const words=hay.split(" ");n.split(" ").forEach(t=>{if(hay.includes(t))s+=24;else if(t.length>3&&words.some(w=>Math.abs(w.length-t.length)<=1&&dist(w,t)<=1))s+=10});return s}
    function results(){return QUESTIONS.map(x=>({x,s:score(x,state.query)})).filter(v=>v.s>0).sort((a,b)=>b.s-a.s)}
    function saveWrong(){localStorage.setItem("on-nhanh-wrong",JSON.stringify(state.wrong))}
    function toggleWrong(id){state.wrong=state.wrong.includes(id)?state.wrong.filter(x=>x!==id):[...state.wrong,id];saveWrong();render()}
    function goQuestion(id){const item=QUESTIONS.find(x=>x.id===id);state.query=item.q;state.tab="search";render();setTimeout(()=>document.getElementById("search")?.focus(),0)}
    function header(){return `<header class="topbar"><div class="brand" aria-hidden="true">ÔN</div><div class="brand-copy"><strong>Ôn Nhanh CNTT</strong><span>${QUESTIONS.length} câu · dùng offline</span></div><span class="local">Lưu trên máy</span></header>`}
    function nav(){return `<nav class="nav" aria-label="Chức năng chính"><button data-tab="search" class="${state.tab==='search'?'active':''}"><span>⌕</span>Tìm kiếm</button><button data-tab="flash" class="${state.tab==='flash'?'active':''}"><span>▣</span>Flashcard</button><button data-tab="wrong" class="${state.tab==='wrong'?'active':''}"><span>!</span>Câu sai${state.wrong.length?`<b>${state.wrong.length}</b>`:''}</button></nav>`}
    function searchView(){const list=results(),top=list[0]?.x;if(!top)return `<main class="main"><p class="eyebrow">Tra nhanh đáp án</p><h1>Gõ vài từ bạn nhớ.</h1>${searchBox()}<div class="meta"><span>Chưa tìm thấy câu phù hợp</span><span class="chip">Tất cả module</span></div><div class="empty"><strong>Thử từ khóa ngắn hơn</strong><p>Gõ không dấu hoặc chỉ nhập 2–4 từ đặc trưng.</p><button id="sample">Xem câu mẫu</button></div></main>`;const alts=top.o.map((o,i)=>({o,i})).filter(v=>v.o!==top.a);return `<main class="main"><p class="eyebrow">Tra nhanh đáp án</p><h1>Gõ vài từ bạn nhớ.</h1>${searchBox()}<div class="meta"><span>${list.length} kết quả phù hợp</span><span class="chip">Module ${top.module}</span></div><article class="answer"><div class="match"><span class="dot"></span>Khớp tốt</div><h2>${esc(top.q)}</h2><div class="correct"><div><small>Đáp án đúng</small><strong>${esc(top.a)}</strong></div><span class="check">✓</span></div><p class="alt-label">Các phương án còn lại</p><ul class="alts">${alts.map(v=>`<li><span>${String.fromCharCode(65+v.i)}</span>${esc(v.o)}</li>`).join("")}</ul><button class="mark ${state.wrong.includes(top.id)?'on':''}" data-wrong="${top.id}">${state.wrong.includes(top.id)?'✓ Đã thêm vào câu sai':'+ Đánh dấu câu chưa nhớ'}</button>${list.length>1?`<div class="more"><h3>Kết quả gần giống</h3>${list.slice(1,4).map(v=>`<button data-open="${v.x.id}"><span>Module ${v.x.module}</span>${esc(v.x.q)}</button>`).join("")}</div>`:''}</article></main>`}
    function searchBox(){return `<form class="search" id="search-form"><label class="sr-only" for="search">Tìm câu hỏi</label><span class="search-icon">⌕</span><input id="search" value="${esc(state.query)}" placeholder="Ví dụ: mainboard, Ctrl S..." autocomplete="off"><button type="button" class="clear" id="clear" aria-label="Xóa">×</button></form>`}
    function flashView(){const item=QUESTIONS[state.card%QUESTIONS.length];return `<main class="main"><div class="section-head"><div><p class="eyebrow">Ôn chủ động</p><h1>Flashcard</h1></div><span>${state.card+1}/${QUESTIONS.length}</span></div><article class="flashcard"><span class="chip">Module ${item.module}</span><h2>${esc(item.q)}</h2>${state.show?`<div class="revealed"><small>Đáp án</small><strong>${esc(item.a)}</strong></div>`:`<button class="reveal" id="reveal">Hiện đáp án</button>`}</article>${state.show?`<div class="recall"><button data-next="wrong">Chưa nhớ</button><button class="remembered" data-next="right">Đã nhớ</button></div>`:''}</main>`}
    function wrongView(){const list=QUESTIONS.filter(x=>state.wrong.includes(x.id));return `<main class="main"><p class="eyebrow">Ôn lại điểm yếu</p><h1>Câu chưa nhớ</h1>${list.length?`<div class="wrong-list">${list.map(x=>`<article class="wrong-item"><button class="open" data-open="${x.id}"><span>Module ${x.module}</span><strong>${esc(x.q)}</strong><small>${esc(x.a)}</small></button><button class="remove" data-wrong="${x.id}" aria-label="Bỏ câu">×</button></article>`).join("")}</div>`:`<div class="empty"><strong>Chưa có câu nào</strong><p>Đánh dấu câu chưa nhớ để ôn lại ở đây.</p><button id="start-flash">Bắt đầu Flashcard</button></div>`}</main>`}
    function render(){app.innerHTML=header()+(location.protocol==='file:'?'<div class="main" style="padding-bottom:0"><p class="notice">Đang mở trực tiếp: mọi chức năng vẫn chạy offline. Khi tự host bằng HTTPS, bạn có thể cài app ra màn hình chính.</p></div>':'')+(state.tab==='search'?searchView():state.tab==='flash'?flashView():wrongView())+nav();bind()}
    function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});document.querySelectorAll('[data-wrong]').forEach(b=>b.onclick=()=>toggleWrong(b.dataset.wrong));document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>goQuestion(b.dataset.open));const form=document.getElementById('search-form');if(form)form.onsubmit=e=>e.preventDefault();const input=document.getElementById('search');if(input)input.oninput=e=>{state.query=e.target.value;render();const next=document.getElementById('search');next?.focus();next?.setSelectionRange(state.query.length,state.query.length)};const clear=document.getElementById('clear');if(clear)clear.onclick=()=>{state.query='';render();document.getElementById('search')?.focus()};const sample=document.getElementById('sample');if(sample)sample.onclick=()=>{state.query='mainboard';render()};const reveal=document.getElementById('reveal');if(reveal)reveal.onclick=()=>{state.show=true;render()};document.querySelectorAll('[data-next]').forEach(b=>b.onclick=()=>{const item=QUESTIONS[state.card%QUESTIONS.length];if(b.dataset.next==='wrong'&&!state.wrong.includes(item.id)){state.wrong.push(item.id);saveWrong()}state.show=false;state.card=(state.card+1)%QUESTIONS.length;render()});const start=document.getElementById('start-flash');if(start)start.onclick=()=>{state.tab='flash';render()}}
    document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();state.tab='search';render();document.getElementById('search')?.focus()}});
    if('serviceWorker'in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('sw.js').catch(()=>{});
    render();
  </script>
</body>
</html>
